spring:
  application:
    name: Apn Opportunity

  # ── Snowflake Datasource ────────────────────────────────────────────────
  # Replace placeholders with actual Snowflake credentials
  datasource:
    url: ${SNOWFLAKE_DATABASE_URL:}
    name: ${SNOWFLAKE_DATABASE_NAME:}
    warehouse: ${SNOWFLAKE_WAREHOUSE:}
    schema: ${SNOWFLAKE_SCHEMA:}
    role: ${SNOWFLAKE_ROLE:}
    username: ${SNOWFLAKE_USERNAME:}
    password: ${SNOWFLAKE_PASSWORD:}
    driver-class-name: net.snowflake.client.jdbc.SnowflakeDriver
    dialect: com.ttn.ck.datasourceconfig.SnowflakeDialect
    caseSensitivity: false
    maxActive: ${SNOWFLAKE_MAX_CONNECTION:50}

  # ── JPA / Hibernate ────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: com.ttn.ck.apn.utils.SnowflakeDialect
        format_sql: true

  # ── Spring AI – OpenAI ─────────────────────────────────────────────────
  ai:
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 1000
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o
          temperature: 0.2

  # ── RabbitMQ ─────────────────────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 90000
          max-attempts: 3
          multiplier: 1.5

  # ── Disable auto-config for services not yet in use ────────────────────
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration

server:
  port: 8080

# ── Custom Application Properties ──────────────────────────────────────
app:
  rabbitmq:
    queue:
      opportunity-refresh: opportunity-refresh-queue
    exchange:
      opportunity: opportunity-exchange
    routing-key:
      opportunity-refresh: opportunity.refresh

