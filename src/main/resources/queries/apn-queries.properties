opportunity.master.data.by.date = SELECT * FROM apn_opportunity_master_data WHERE OPPORTUNITY_RAISED = :opportunityRaised AND OPPORTUNITY_RAISED_DATE BETWEEN :startDate AND :endDate ORDER BY CREATED_DATE DESC
opportunity.master.data.by.uuid = SELECT * FROM apn_opportunity_master_data WHERE LINEITEM_UUID IN ( :opportunityMasterUuids ) ;
opportunity.raw.data.by.master.uuid = SELECT * FROM apn_opportunity_raw_data AS aord WHERE aord.LINEITEM_UUID in (SELECT RAW_UUID FROM apn_opportunity_master_raw AS aomr WHERE aomr.LINEITEM_UUID =  :masterUuid)  ORDER BY LOGGED_DATE DESC
update.opportunity.raise.status = UPDATE apn_opportunity_master_data SET OPPORTUNITY_RAISED = :opportunityRaised, OPPORTUNITY_RAISED_DATE = CURRENT_TIMESTAMP(), OPPORTUNITY_RAISED_BY = :user, MODIFIED_DATE = CURRENT_TIMESTAMP() WHERE LINEITEM_UUID = :masterUuid
