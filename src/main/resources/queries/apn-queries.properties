opportunity.master.data.by.date = SELECT * FROM apn_opportunity_master_data WHERE OPPORTUNITY_RAISED = :opportunityRaised AND CREATED_DATE BETWEEN :startDate AND :endDate ORDER BY CREATED_DATE DESC
opportunity.master.data.by.uuid = SELECT * FROM apn_opportunity_master_data WHERE MASTER_UUID IN ( :opportunityMasterUuids ) ;
opportunity.raw.data.by.master.uuid = SELECT * FROM apn_opportunity_raw_data AS aord WHERE aord.RAW_UUID in (SELECT RAW_UUID FROM apn_opportunity_master_raw AS aomr WHERE aomr.MASTER_UUID =  :masterUuid)  ORDER BY LOGGED_DATE DESC
opportunity.unprocessed.raw.data = SELECT r.* FROM apn_opportunity_raw_data r LEFT JOIN apn_opportunity_master_raw map ON map.RAW_UUID = r.RAW_UUID WHERE map.RAW_UUID IS NULL ORDER BY r.CUSTOMER_NAME
insert.opportunity.master.data = INSERT INTO apn_opportunity_master_data (CREATED_DATE, MODIFIED_DATE, CUSTOMER_NAME, CUSTOMER_COMPANY_NAME, INDUSTRY, INDUSTRY_OTHER, COUNTRY, STATE, POSTAL_CODE, WEBSITE, PARTNER_PRIMARY_NEED_FROM_AWS, PARTNER_PROJECT_TITLE, CUSTOMER_BUSINESS_PROBLEM, SOLUTION_OFFERED, ESTIMATED_MONTHLY_REVENUE, TARGET_CLOSE_DATE, OPPORTUNITY_TYPE, DELIVERY_MODEL, IS_OPPORTUNITY_FROM_MARKETING, SALES_ACTIVITY, LINEITEM_USAGEACCOUNTID, OPPORTUNITY_RAISED, CLOUD_PLATFORM, PARTNER_NAME ) SELECT CURRENT_DATE AS CREATED_DATE, CURRENT_DATE AS MODIFIED_DATE, r.CUSTOMER_NAME, c.CUSTOMER_COMPANY_NAME, c.INDUSTRY, c.INDUSTRY_OTHER, c.COUNTRY, c.STATE, c.POSTAL_CODE, c.WEBSITE, 'Co-Sell - Deal Support' AS PARTNER_PRIMARY_NEED_FROM_AWS, r.WORKLOAD_TITLE AS PARTNER_PROJECT_TITLE, r.WORKLOAD_DESCRIPTION AS CUSTOMER_BUSINESS_PROBLEM, 'S-0014641' AS SOLUTION_OFFERED, SUM(r.TOTAL_PERIOD_COST) AS ESTIMATED_MONTHLY_REVENUE, DATEADD(MONTH,3,CURRENT_DATE) AS TARGET_CLOSE_DATE, 'Expansion' AS OPPORTUNITY_TYPE, 'Professional Services' AS DELIVERY_MODEL, FALSE AS IS_OPPORTUNITY_FROM_MARKETING, 'Completed Action Plan' AS SALES_ACTIVITY, r.LINEITEM_USAGEACCOUNTID, FALSE AS OPPORTUNITY_RAISED, r.CLOUD_PLATFORM, c.PARTNER_NAME FROM apn_opportunity_raw_data r JOIN customers_communication_data c ON r.CUSTOMER_NAME = c.CUSTOMER_NAME LEFT JOIN apn_opportunity_master_raw m ON r.RAW_UUID = m.RAW_UUID WHERE m.RAW_UUID IS NULL AND r.WORKLOAD_DESCRIPTION = :workloadDescription AND r.customer_name = :customerName AND r.LINEITEM_USAGEACCOUNTID = :accountId GROUP BY r.CUSTOMER_NAME, r.LINEITEM_USAGEACCOUNTID, r.WORKLOAD_TITLE, r.WORKLOAD_DESCRIPTION, r.CLOUD_PLATFORM, c.CUSTOMER_COMPANY_NAME, c.INDUSTRY, c.INDUSTRY_OTHER, c.COUNTRY, c.STATE, c.POSTAL_CODE, c.WEBSITE, c.PARTNER_NAME
insert.opportunity.mapping.data = INSERT INTO apn_opportunity_master_raw (MASTER_UUID, RAW_UUID) SELECT m.MASTER_UUID, r.RAW_UUID FROM apn_opportunity_master_data m JOIN apn_opportunity_raw_data r ON r.CUSTOMER_NAME = m.CUSTOMER_NAME AND r.LINEITEM_USAGEACCOUNTID = m.LINEITEM_USAGEACCOUNTID AND r.workload_description = m.customer_business_problem WHERE m.CUSTOMER_NAME = :customerName AND m.LINEITEM_USAGEACCOUNTID = :accountId AND m.CUSTOMER_BUSINESS_PROBLEM = :workloadDescription AND NOT EXISTS ( SELECT 1  FROM apn_opportunity_master_raw arp WHERE arp.MASTER_UUID = m.MASTER_UUID AND arp.RAW_UUID = r.RAW_UUID)
update.opportunity.raise.status = UPDATE apn_opportunity_master_data SET OPPORTUNITY_RAISED = :opportunityRaised, OPPORTUNITY_RAISED_DATE = CURRENT_TIMESTAMP(), OPPORTUNITY_RAISED_BY = :user, MODIFIED_DATE = CURRENT_TIMESTAMP() WHERE LINEITEM_UUID = :masterUuid
update.apn.opportunity.raw.data.by.lineitem.uuid = UPDATE apn_opportunity_raw_data SET workload_title = ?, workload_description = ? WHERE RAW_UUID = ?
