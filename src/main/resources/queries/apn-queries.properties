opportunity.master.data.by.date = SELECT * FROM apn_opportunity_master_data WHERE OPPORTUNITY_RAISED = :opportunityRaised AND OPPORTUNITY_RAISED_DATE BETWEEN :startDate AND :endDate ORDER BY CREATED_DATE DESC
opportunity.master.data.by.uuid = SELECT * FROM apn_opportunity_master_data WHERE LINEITEM_UUID IN ( :opportunityMasterUuids ) ;
opportunity.raw.data.by.master.uuid = SELECT * FROM apn_opportunity_raw_data AS aord WHERE aord.LINEITEM_UUID in (SELECT RAW_UUID FROM apn_opportunity_master_raw AS aomr WHERE aomr.LINEITEM_UUID =  :masterUuid)  ORDER BY LOGGED_DATE DESC
opportunity.unprocessed.raw.data = WITH workload_cost AS (SELECT CUSTOMER_NAME as customerName, LINEITEM_USAGEACCOUNTID as accountId, WORKLOAD_TITLE as workloadTitle, WORKLOAD_DESCRIPTION as workloadDescription, SUM(TOTAL_PERIOD_COST) AS totalCost FROM apn_opportunity_raw_data GROUP BY 1, 2, 3, 4 ) SELECT wc.* FROM workload_cost wc LEFT JOIN apn_opportunity_raw_data r ON wc.customerName = r.CUSTOMER_NAME AND wc.accountId = r.LINEITEM_USAGEACCOUNTID LEFT JOIN apn_opportunity_master_raw map ON map.RAW_UUID = r.RAW_UUID WHERE map.RAW_UUID IS NULL ORDER BY wc.customerName
insert.opportunity.master.data = INSERT INTO apn_opportunity_master_data (CREATED_DATE, MODIFIED_DATE, CUSTOMER_NAME, CUSTOMER_COMPANY_NAME, INDUSTRY, INDUSTRY_OTHER, COUNTRY, STATE, POSTAL_CODE, WEBSITE, PARTNER_PRIMARY_NEED_FROM_AWS, PARTNER_PROJECT_TITLE, CUSTOMER_BUSINESS_PROBLEM, SOLUTION_OFFERED, ESTIMATED_MONTHLY_REVENUE, TARGET_CLOSE_DATE, OPPORTUNITY_TYPE, DELIVERY_MODEL, IS_OPPORTUNITY_FROM_MARKETING, SALES_ACTIVITY, LINEITEM_USAGEACCOUNTID, OPPORTUNITY_RAISED, CLOUD_PLATFORM, PARTNER_NAME ) SELECT CURRENT_DATE AS CREATED_DATE, CURRENT_DATE AS MODIFIED_DATE, r.CUSTOMER_NAME, c.CUSTOMER_COMPANY_NAME, c.INDUSTRY, c.INDUSTRY_OTHER, c.COUNTRY, c.STATE, c.POSTAL_CODE, c.WEBSITE, 'Co-Sell - Deal Support' AS PARTNER_PRIMARY_NEED_FROM_AWS, r.WORKLOAD_TITLE AS PARTNER_PROJECT_TITLE, r.WORKLOAD_DESCRIPTION AS CUSTOMER_BUSINESS_PROBLEM, 'S-0014641' AS SOLUTION_OFFERED, SUM(r.TOTAL_PERIOD_COST) AS ESTIMATED_MONTHLY_REVENUE, DATEADD(MONTH,3,CURRENT_DATE) AS TARGET_CLOSE_DATE, 'Expansion' AS OPPORTUNITY_TYPE, 'Professional Services' AS DELIVERY_MODEL, FALSE AS IS_OPPORTUNITY_FROM_MARKETING, 'Completed Action Plan' AS SALES_ACTIVITY, r.LINEITEM_USAGEACCOUNTID, FALSE AS OPPORTUNITY_RAISED, r.CLOUD_PLATFORM, c.PARTNER_NAME FROM apn_opportunity_raw_data r JOIN customers_communication_data c ON r.CUSTOMER_NAME = c.CUSTOMER_NAME LEFT JOIN apn_opportunity_master_raw m ON r.RAW_UUID = m.RAW_UUID WHERE m.RAW_UUID IS NULL AND r.WORKLOAD_DESCRIPTION = :workloadDescription GROUP BY r.CUSTOMER_NAME, r.LINEITEM_USAGEACCOUNTID, r.WORKLOAD_TITLE, r.WORKLOAD_DESCRIPTION, r.CLOUD_PLATFORM, c.CUSTOMER_COMPANY_NAME, c.INDUSTRY, c.INDUSTRY_OTHER, c.COUNTRY, c.STATE, c.POSTAL_CODE, c.WEBSITE, c.PARTNER_NAME
insert.opportunity.mapping.data = INSERT INTO apn_opportunity_master_raw (MASTER_UUID, RAW_UUID) SELECT :masterUUID, RAW_UUID FROM apn_opportunity_raw_data WHERE CUSTOMER_NAME = :customerName AND LINEITEM_USAGEACCOUNTID = :accountId AND WORKLOAD_DESCRIPTION = :workloadDescription
update.opportunity.raise.status = UPDATE apn_opportunity_master_data SET OPPORTUNITY_RAISED = :opportunityRaised, OPPORTUNITY_RAISED_DATE = CURRENT_TIMESTAMP(), OPPORTUNITY_RAISED_BY = :user, MODIFIED_DATE = CURRENT_TIMESTAMP() WHERE LINEITEM_UUID = :masterUuid
