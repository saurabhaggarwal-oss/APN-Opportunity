customer.communication.getAll=SELECT * FROM customer_communication_data WHERE PARTNER_NAME = :partnerName ORDER BY CREATED_DATE DESC
customer.communication.add= INSERT INTO customer_communication_data (CUSTOMER_NAME, CUSTOMER_COMPANY_NAME, INDUSTRY, INDUSTRY_OTHER, COUNTRY, STATE, POSTAL_CODE, WEBSITE, PARTNER_NAME, CREATED_DATE, MODIFIED_DATE) VALUES (:customerName, :customerCompanyName, :industry, :industryOther, :country, :state, :postalCode, :website, :partnerName, CURRENT_TIMESTAMP(), CURRENT_TIMESTAMP())
customer.communication.update=UPDATE customer_communication_data SET CUSTOMER_NAME = :customerName, CUSTOMER_COMPANY_NAME = :customerCompanyName, INDUSTRY = :industry, INDUSTRY_OTHER = :industryOther, COUNTRY = :country, STATE = :state, POSTAL_CODE = :postalCode, WEBSITE = :website, MODIFIED_DATE = CURRENT_TIMESTAMP() WHERE CUSTOMER_UUID = :uuid
customer.communication.delete=DELETE FROM customer_communication_data WHERE CUSTOMER_UUID = :uuid
customer.communication.getByUuid= SELECT * FROM customer_communication_data WHERE CUSTOMER_UUID = :uuid ORDER BY CREATED_DATE DESC
